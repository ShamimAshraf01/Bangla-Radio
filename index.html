    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden;
            font-family:'Hind Siliguri',-apple-system,BlinkMacSystemFont,sans-serif;
            background:#080808;touch-action:manipulation;-webkit-font-smoothing:antialiased}

        /* ═══ BODY — Matte black premium chassis ═══ */
        #app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden;
            background:#101010;
            border-left:1px solid #1e1e1e;border-right:1px solid #1e1e1e;
            box-shadow:0 0 60px rgba(0,0,0,.8);color:#e0e0e0}
        @supports not (height:100dvh){#app{height:100vh}}

        /* ═══ SPEAKER — Metal mesh grille ═══ */
        .speaker{flex-shrink:0;height:36px;position:relative;overflow:hidden;
            background:
                radial-gradient(circle,#252525 1px,transparent 1px),
                radial-gradient(circle,#252525 1px,transparent 1px);
            background-size:5px 5px;background-position:0 0,2.5px 2.5px;
            border-bottom:1px solid #2a2a2a}
        .speaker::before{content:'';position:absolute;inset:0;
            background:linear-gradient(180deg,rgba(0,0,0,.4),transparent 40%,transparent 60%,rgba(0,0,0,.5))}

        /* ═══ HEADER — Minimal brand ═══ */
        .hdr{padding:8px 16px 4px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
        .hdr-l{display:flex;align-items:center;gap:6px}
        .hdr-l span{display:none}
        .hdr h1{font-size:15px;font-weight:700;color:#808080;letter-spacing:3px;text-transform:uppercase}
        .hdr-r{display:flex;gap:2px}
        .hdr-btn{background:none;border:none;color:#404040;font-size:14px;
            width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
            justify-content:center;cursor:pointer}
        .hdr-btn:active{color:#aaa}
        #btnInstall{display:none}

        /* ═══ DISPLAY — OLED-style screen ═══ */
        .display{flex-shrink:0;margin:6px 14px;
            background:#080808;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px;
            position:relative;overflow:hidden;
            box-shadow:inset 0 0 20px rgba(0,0,0,.8),inset 0 2px 4px rgba(0,0,0,.6)}
        .display::before{content:'';position:absolute;inset:0;border-radius:10px;
            background:linear-gradient(180deg,rgba(255,255,255,.02),transparent 50%);pointer-events:none}
        .display-inner{display:flex;align-items:center;gap:10px}
        .led-pwr{width:5px;height:5px;border-radius:50%;background:#ff3b30;flex-shrink:0;
            box-shadow:0 0 3px #ff3b30}
        .led-sig{width:5px;height:5px;border-radius:50%;background:#1a1a1a;flex-shrink:0;transition:all .5s}
        .led-sig.on{background:#30d158;box-shadow:0 0 4px #30d158}
        .display-text{flex:1;font-size:14px;font-weight:600;min-width:0;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            color:#2a2a2a;transition:color .4s,text-shadow .4s}
        .display-text.on{color:#ffffff;text-shadow:0 0 8px rgba(255,255,255,.15)}
        .display-freq{font-size:10px;color:#2a2a2a;flex-shrink:0;transition:color .4s}
        .display-freq.on{color:#666}

        /* ═══ DIVIDER ═══ */
        .chrome{height:1px;flex-shrink:0;margin:6px 16px;background:#1e1e1e}

        /* ═══ BAND TABS — Rubber selector buttons ═══ */
        .tabs{display:flex;gap:5px;padding:4px 12px 6px;overflow-x:auto;flex-shrink:0;
            -webkit-overflow-scrolling:touch;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;
            white-space:nowrap;cursor:pointer;flex-shrink:0;
            border:1px solid #222;background:#181818;color:#555;transition:all .12s;
            box-shadow:0 2px 4px rgba(0,0,0,.4)}
        .tab:active{transform:translateY(1px);box-shadow:0 1px 2px rgba(0,0,0,.3)}
        .tab.active{background:#e0e0e0;color:#111;border-color:#ccc;

        /* ═══ STATION GRID ═══ */
        .gw{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 10px 14px;scrollbar-width:none}
        .gw::-webkit-scrollbar{display:none}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

        /* ═══ CARD — Rubber-touch preset button ═══ */
        .card{
            border-radius:10px;padding:12px 8px 10px;
            display:flex;flex-direction:column;gap:6px;
            cursor:pointer;position:relative;
            -webkit-user-select:none;user-select:none;
            min-height:84px;
            background:#181818;border:1px solid #252525;
            transition:transform .08s,box-shadow .08s;
            box-shadow:0 4px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.03)}
        .card:active{transform:translateY(3px);
            box-shadow:0 1px 2px rgba(0,0,0,.4);background:#141414}
        .card.playing{border-color:#30d158;
            box-shadow:0 0 10px rgba(48,209,88,.08),0 4px 8px rgba(0,0,0,.5)}
        .card.loading{border-color:#ff9f0a}
        .card.web{opacity:.4}
        .card.web:active{opacity:.6}

        .card-top{display:flex;align-items:center;justify-content:space-between}
        .card-icon{width:34px;height:34px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;font-size:15px;
            background:#222;border:2px solid #333;
            box-shadow:inset 0 2px 4px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.3)}
        .card.playing .card-icon{border-color:#30d158;
            box-shadow:0 0 6px rgba(48,209,88,.12),inset 0 1px 2px rgba(255,255,255,.05)}
        .card.loading .card-icon{border-color:#ff9f0a}

        .card-live{width:5px;height:5px;border-radius:50%;background:#30d158;
            box-shadow:0 0 4px #30d158;display:none}
        .card.playing .card-live{display:block;animation:pulse 2s infinite}

        .card-info{display:flex;flex-direction:column;gap:1px}
        .card-name{font-size:11px;font-weight:700;line-height:1.2;color:#bbb}
        .card.playing .card-name{color:#30d158}
        .card-freq{font-size:8px;color:#555;font-weight:400}

        .card .fav-dot{position:absolute;bottom:6px;right:8px;font-size:7px;color:#ff375f}
        .card .fav-dot::after{content:"❤"}
        .card .web-tag{position:absolute;top:6px;right:6px;font-size:6px;font-weight:700;
            background:#222;padding:2px 4px;border-radius:3px;color:#555;letter-spacing:.5px}

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

        /* ═══ CRICKET BANNER ═══ */
        .cbanner{background:#151a15;border:1px solid #253025;border-radius:10px;
            padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer}
        .cbanner:active{transform:scale(.98)}
        .cbanner span:first-child{font-size:22px}
        .cbanner div{font-size:10px;color:#555;line-height:1.4}
        .cbanner strong{color:#30d158;font-size:12px;display:block}

        /* ═══ CONTROL PANEL ═══ */
        .player{flex-shrink:0;background:#0c0c0c;border-top:1px solid #222;
            padding:8px 14px 10px;position:relative;z-index:50}

        .player.idle .p-active{display:none}
        .player.idle .p-idle{display:flex}
        .player.on .p-active{display:flex}
        .player.on .p-idle{display:none}

        .p-idle{align-items:center;justify-content:center;height:42px;color:#2a2a2a;font-size:12px;gap:6px}

        .p-active{display:flex;align-items:center;gap:8px;padding:4px 0}
        .p-station{flex:1;min-width:0}
        .p-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e0e0}
        .p-name.buffering{color:#ff9f0a}
        .p-freq{font-size:9px;color:#555}

        .p-btns{display:flex;align-items:center;gap:6px}
        .p-btn{border-radius:50%;border:none;cursor:pointer;
            display:flex;align-items:center;justify-content:center;transition:transform .08s}
        .p-btn:active{transform:scale(.85)}

        .p-stop{width:40px;height:40px;font-size:14px;
            background:radial-gradient(circle at 45% 40%,#f04040,#c02020);color:#fff;
            border:2px solid #ff4040;
            box-shadow:0 3px 10px rgba(224,48,48,.35),inset 0 1px 1px rgba(255,255,255,.2)}
        .p-stop:active{box-shadow:0 1px 4px rgba(224,48,48,.2)}

        .p-nav{width:32px;height:32px;font-size:11px;
            background:#222;color:#aaa;border:2px solid #333;
            box-shadow:0 2px 5px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04)}
        .p-nav:active{box-shadow:0 1px 2px rgba(0,0,0,.3)}

        .p-sleep{width:30px;height:30px;font-size:10px;
            background:#181818;color:#444;border:1px solid #252525;
            box-shadow:0 2px 4px rgba(0,0,0,.3)}

        .p-vol-inline{-webkit-appearance:none;appearance:none;width:40px;height:4px;
            background:#222;border-radius:2px;outline:none;flex-shrink:0}
        .p-vol-inline::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
            border-radius:50%;cursor:pointer;background:#ddd;border:2px solid #aaa;
            box-shadow:0 2px 6px rgba(0,0,0,.5)}

        .wood-edge{flex-shrink:0;height:4px;background:#181818;border-top:1px solid #222}

        .hidden{display:none!important}
        @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
        @media(min-width:420px){.grid{gap:8px}}
        @media(min-width:500px){.grid{grid-template-columns:repeat(4,1fr)}}
    </style>
